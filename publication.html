<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publication - Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="publication">
  <header class="topbar amazon-header">
    <a class="brand-logo" href="home.html"><img class="site-logo" src="images/logo.png" alt="Kome-Gab"></a>
    <div class="top-actions">
      <a class="profile-avatar-link" href="profile.html" id="profileAvatarLink">
        <img id="headerProfileAvatar" class="header-profile-avatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff&size=32" alt="Profil">
      </a>
      <a class="link-btn" href="login.html" id="authLink">Déconnexion</a>
    </div>
  </header>

  <nav id="mobileMenu" class="mobile-menu" aria-hidden="true">
    <a href="index.html">Accueil</a>
    <a href="occasion.html">Occasion</a>
    <a href="boutique.html">Boutiques</a>
    <a href="publication.html">Publication</a>
    <a href="dashboard.html">Dashboard</a>
    <!-- <a href="register.html">Créer un compte</a> -->
  </nav>


  <main class="page">
    <section class="panel form">
      <h2>Publier un produit</h2>
      <label for="occName">Nom du produit</label>
      <input id="occName" placeholder="Ex: iPhone 12">

      <label for="occDescription">Description</label>
      <textarea id="occDescription" rows="3" placeholder="État, accessoires, etc."></textarea>

      <label for="occPrice">Prix (FCFA)</label>
      <input id="occPrice" type="number" min="0" placeholder="100000">

      <label for="occImageFiles">Images produit</label>
      <input id="occImageFiles" type="file" accept="image/*" multiple>
      <p class="small">Sélectionnez plusieurs images depuis vos dossiers (max 8 images, 2 Mo/image).</p>
      <div id="occImagePreviewList" class="preview-grid"></div>

      <label for="occCategory">Catégorie</label>
      <select id="occCategory">
        <option value="Téléphone">Téléphone</option>
        <option value="Ordinateur">Ordinateur</option>
        <option value="Voiture">Voiture</option>
        <option value="Vêtement">Vêtement</option>
        <option value="Chaussures">Chaussures</option>
        <option value="Accessoires">Accessoires</option>
        <option value="Montre">Montre</option>
        <option value="Bijoux">Bijoux</option>
        <option value="Nourriture">Nourriture</option>
        <option value="Autre">Autre</option>
      </select>

      <label for="occPhone">Numéro WhatsApp (sans +)</label>
      <input id="occPhone" placeholder="241XXXXXXXX">

      <button id="publishOccasionBtn">Publier</button>
    </section>
  </main>

  <script type="module" src="js/script.js"></script>
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
</body>
</html>
