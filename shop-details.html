<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boutique - Kome-Gab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Boutique en ligne Kome-Gab">
    <!-- On garde tes styles spécifiques pour cette page -->
    <style>
        * { box-sizing: border-box; }
        body{ margin: 0; font-family: "Nunito Sans", sans-serif; background:#f5f5f5; overflow-x: hidden; }
        /* RESET NAVBAR STYLE pour correspondre à ton design sombre */
        .shop-navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #111; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .shop-logo img { height: 50px; width: auto; object-fit: contain; }
        .shop-nav-links { list-style:none; display:flex; gap:20px; margin: 0; padding: 0; }
        .shop-nav-links a { color:white; text-decoration:none; font-weight:bold; cursor: pointer; }
        
        /* HERO */
        .shop-hero { min-height: clamp(320px, 58vh, 620px); background:linear-gradient(to right,#111,#444); color:white; display:flex; align-items:center; justify-content:center; text-align:center; padding:18px; background-size: cover; background-position: center; position: relative; }
        .shop-hero::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); }
        .shop-hero-content { position: relative; z-index: 2; max-width: 800px; width: min(100%, 760px); padding-top: 36px; }
        .shop-hero h1 { font-size: clamp(1.55rem, 5.2vw, 2.5rem); margin: 0 0 10px; line-height: 1.15; }
        .shop-hero p { font-size: clamp(0.95rem, 2.8vw, 1.1rem); margin: 0 0 18px; }
        .shop-hero-actions { margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        /* SECTIONS */
        .shop-section { padding: clamp(18px, 5vw, 40px) clamp(10px, 4vw, 20px); text-align:center; max-width: 1200px; margin: 0 auto; }
        
        /* PRODUITS GRID */
        .shop-products { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap: clamp(10px, 2.8vw, 24px); margin-top: 16px; }
        .shop-product-card { background:white; padding: clamp(10px, 2.8vw, 15px); border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); transition:0.3s; text-align: left; }
        .shop-product-card:hover { transform:translateY(-5px); }
        .shop-product-img { width:100%; height: clamp(130px, 32vw, 200px); object-fit: cover; border-radius:10px; margin-bottom: 10px; }
        .shop-product-title { font-size: clamp(0.95rem, 2.8vw, 1.1rem); margin: 0 0 5px; font-weight: bold; }
        .shop-product-price { color: #ff6a00; font-weight: bold; font-size: clamp(0.95rem, 2.8vw, 1.1rem); margin-bottom: 10px; }
        
        /* BUTTONS */
        .shop-btn { display:inline-block; padding:10px 25px; background:#ff6a00; color:white; text-decoration:none; border-radius:30px; transition:0.3s; border: none; cursor: pointer; font-weight: bold; }
        .shop-btn:hover { background:#e55f00; transform: scale(1.05); }
        .shop-btn-small { display:inline-block; padding:8px 15px; background:#111; color:white; text-decoration:none; border-radius:20px; font-size: clamp(0.78rem, 2.5vw, 0.9rem); border: none; cursor: pointer; }
        .shop-btn-small:hover { background: #333; }

        /* SEARCH */
        .shop-search-box { position:relative; max-width:600px; margin:0 auto 14px; }
        .shop-search-input { width:100%; padding: 12px 20px; border:1px solid #ddd; border-radius:30px; font-size:1rem; box-shadow:0 4px 10px rgba(0,0,0,0.05); }

        /* FOOTER */
        footer { background:#111; color:white; text-align:center; padding:20px; margin-top: 50px; }
        
        /* RESPONSIVE */
        @media (max-width: 900px){
            .shop-products { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 768px){
            .shop-hero { min-height: 46vh; }
            .shop-product-card { padding: 10px; }
            .shop-product-card:hover { transform: none; }
            .shop-navbar { flex-direction: column; gap: 10px; }
            .shop-header-top { top: 12px; left: 12px; gap: 10px; }
            .shop-header-top .back-btn { width: 36px; height: 36px; }
            .shop-logo-mini { width: 42px; height: 42px; }
            .shop-hero-content { padding-top: 40px; }
            .wa-float { bottom: calc(90px + env(safe-area-inset-bottom, 0px)); right: 14px; }
            .shop-dashboard-float { width: 40px; height: 40px; }
        }

        @media (max-width: 430px){
            .shop-section { padding-left: 8px; padding-right: 8px; }
            .shop-products { gap: 8px; }
            .shop-search-input { font-size: 0.95rem; padding: 11px 14px; }
            .shop-hero-actions { gap: 8px; }
            .shop-btn-small { padding: 7px 11px; }
        }

        @media (max-width: 360px){
            .shop-products { grid-template-columns: 1fr; }
            .shop-hero { min-height: 42vh; }
            .shop-hero-content { padding-top: 44px; }
        }
        
        /* WA FLOAT */
        .wa-float { position:fixed; bottom: calc(86px + env(safe-area-inset-bottom, 0px)); right: 22px; background:#25D366; color:white; font-size:28px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius:50%; text-decoration:none; z-index: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .shop-dashboard-float { position:fixed; top: 50%; right: 0; transform: translateY(-50%); background:#111; color:#fff; width: 44px; height: 44px; border-radius: 12px 0 0 12px; display: none; align-items: center; justify-content: center; text-decoration:none; z-index: 901; box-shadow: 0 4px 10px rgba(0,0,0,0.25); }
        .shop-dashboard-float:hover { background:#222; }
    
        /* HEADER TOP LEFT */
        .shop-header-top { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 15px; z-index: 10; }
        .shop-header-top .back-btn { background: rgba(0,0,0,0.3); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: white; padding: 0; margin: 0; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); }
        .shop-header-top .back-btn:hover { background: rgba(0,0,0,0.5); }
        .shop-logo-mini { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); background: #fff; }
    </style>
    <!-- CSS Global pour le panier latéral -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="shop-details">

<!-- Injecter le panier latéral du projet principal -->
<div id="cartSidebarContainer"></div>


<!-- HERO SECTION DYNAMIQUE -->
<header id="shopHero" class="shop-hero">
    <div class="shop-header-top">
        <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-left"></i></button>
        <img id="shopLogoImg" src="https://placehold.co/50x50?text=Shop" alt="Logo" class="shop-logo-mini">
    </div>
    <div class="shop-hero-content">
        <h1 id="shopNameHero">Chargement...</h1>
        <p id="shopDescHero"></p>
        <div class="shop-hero-actions">
            <button id="followShopBtn" class="shop-btn-small" style="background: white; color: #111;">Suivre la boutique</button>
            <button id="shareShopBtn" class="shop-btn-small" style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(4px);"><i class="fa-solid fa-share-nodes"></i> Partager</button>
        </div>
    </div>
</header>


<!-- BARRE DE RECHERCHE INTERNE -->
<div class="shop-section">
    <div class="shop-search-box">
        <input id="shopSearchInput" class="shop-search-input" type="search" placeholder="Rechercher dans cette boutique..." autocomplete="off" />
    </div>
</div>

<!-- LISTE DES PRODUITS -->
<section id="shopProductsList" class="shop-section">
    <h2 style="margin-bottom: 30px;">Nos Produits</h2>
    <div id="productsGrid" class="shop-products">
        <!-- Les produits seront injectés ici par JS -->
        <p style="grid-column: 1/-1;">Chargement des produits...</p>
    </div>
</section>

<!-- CONTACT / FOOTER -->
<footer id="shopFooter">
    <h3 id="shopNameFooter">Boutique</h3>
    <p id="shopAddressFooter"></p>
    <p id="shopHoursFooter"></p>
    <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.7;">Propulsé par Kome-Gab Marketplace</p>
</footer>

<!-- Bouton WhatsApp Flottant -->
<a href="#" id="shopWhatsappBtn" class="wa-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>
<a href="dashboard.html" id="shopDashboardBtn" class="shop-dashboard-float" title="Dashboard boutique">
    <i class="fas fa-user"></i>
</a>

<!-- Modal pour afficher les photos de profil en grand -->
<div id="profileImageModal" class="profile-image-modal" onclick="closeProfileImageModal()">
    <img id="modalProfileImage" src="" alt="Photo de profil en grand">
</div>

<!-- Scripts -->
<script type="module" src="js/script.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
