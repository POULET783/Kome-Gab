<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="login">

    <header class="site-header">
      <div class="container header-inner">
        <img src="images/logo.png" alt="Logo" class="logo" />
        <div class="brand">
          <p class="tagline">Connectez-vous pour accéder à votre espace</p>
        </div>
      </div>
    </header>
  

  <main id="login-page" class="page">
    <section class="panel form">
      <div class="form-header">
        <button class="back-button" onclick="history.back()" title="Retour">
          <i class="fas fa-arrow-left"></i>
        </button>
        <h2>Se connecter</h2>
      </div>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="email@exemple.com">

      <label for="password">Mot de passe</label>
      <div class="password-input-container">
      <input id="password" type="password" placeholder="Votre mot de passe">
        <button type="button" class="password-toggle" id="passwordToggle">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <button id="loginBtn">Se connecter</button>
      <p class="small">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
    </section>
  </main>

  <script type="module" src="js/script.js"></script>
</body>
</html>
