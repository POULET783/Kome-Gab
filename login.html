<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
  <header class="topbar">
    <a class="brand-logo" href="index.html"><img class="site-logo" src="images/logo.png" alt="Kome-Gab"></a>
    <a class="link-btn" href="register.html">Inscription</a>
  </header>

  <nav id="mobileMenu" class="mobile-menu" aria-hidden="true">
    <a href="index.html">Accueil</a>
    <a href="occasion.html">Occasion</a>
    <a href="register.html">Créer un compte</a>
  </nav>

  <main class="page">
    <section class="panel form">
      <h2>Se connecter</h2>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="email@exemple.com">

      <label for="password">Mot de passe</label>
      <input id="password" type="password" placeholder="Votre mot de passe">

      <button id="loginBtn">Se connecter</button>
      <p class="small">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
