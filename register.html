<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="register">

    <header class="site-header">
      <div class="container header-inner">
        <img src="images/logo.png" alt="Logo" class="logo" />
        <div class="brand">
          <p class="tagline">Créez votre compte et accéder à votre espace</p>
        </div>
      </div>
    </header>

  <main class="page">
    <section class="panel form">
      <div class="form-header">
        <button class="back-button" onclick="history.back()" title="Retour">
          <i class="fas fa-arrow-left"></i>
        </button>
        <h2>Inscription</h2>
      </div>

      <label for="name">Nom</label>
      <input id="name" placeholder="Votre nom">

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="email@exemple.com">

      <label for="password">Mot de passe</label>
      <div class="password-input-container">
      <input id="password" type="password" placeholder="Choisir un mot de passe">
        <button type="button" class="password-toggle" id="passwordToggle">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
      
      <!-- Critères du mot de passe -->
      <div class="password-criteria">
        <div class="criteria-item" id="length-criteria">
          <span class="criteria-icon">○</span>
          <span>Au moins 6 caractères</span>
        </div>
        <div class="criteria-item" id="uppercase-criteria">
          <span class="criteria-icon">○</span>
          <span>Au moins une majuscule</span>
        </div>
        <div class="criteria-item" id="lowercase-criteria">
          <span class="criteria-icon">○</span>
          <span>Au moins une minuscule</span>
        </div>
        <div class="criteria-item" id="number-criteria">
          <span class="criteria-icon">○</span>
          <span>Au moins un chiffre</span>
        </div>
      </div>

      <label for="whatsapp">Numéro WhatsApp (sans +)</label>
      <input id="whatsapp" placeholder="241XXXXXXXX">

      <label for="role">Type de compte</label>
      <select id="role">
        <option value="user">Utilisateur normal</option>
        <option value="seller">Vendeur</option>
      </select>

      <button id="registerBtn">Créer le compte</button>
      <p class="small">Vous avez déjà un compte ? <a href="login.html">Connectez-vous</a></p>
    </section>
  </main>

  <script type="module" src="js/script.js"></script>
</body>
</html>
