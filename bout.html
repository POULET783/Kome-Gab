<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer une boutique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 95%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #000000;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #171818;
    }

    .preview {
      text-align: center;
      margin-top: 10px;
    }

    .preview img {
      max-width: 100px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<div class="container">
   
  <h2>Créer une boutique</h2>

  <form id="shopForm">
    <input type="text" id="name" placeholder="Nom de la boutique" required>

    <input type="text" id="owner" placeholder="Nom du propriétaire" required>

    <textarea id="description" placeholder="Description de la boutique"></textarea>

    <input type="file" id="image" accept="image/*">

    <div class="preview" id="preview"></div>

    <input type="text" id="location" placeholder="Localisation">

    <label for="shopOpenDayInput">Jours d'ouverture</label>
    
    <textarea id="shopOpenDayInput" placeholder="ex: Lundi - Samedi" rows="2"></textarea>

        
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
            <div>
              <label for="shopOpenTimeInput" style="font-size: 0.85rem;">Heure d'ouverture (Auto)</label>
              <input type="time" id="shopOpenTimeInput">
            </div>
            <div>
              <label for="shopCloseTimeInput" style="font-size: 0.85rem;">Heure de fermeture (Auto)</label>
              <input type="time" id="shopCloseTimeInput">
            </div>       
    </div>
    
    <button type="submit">Créer la boutique</button>
  </form>
</div>

<script>
  const form = document.getElementById("shopForm");
  const preview = document.getElementById("preview");

  let imageFile = null;

  // Preview image
  document.getElementById("image").addEventListener("change", (e) => {
    imageFile = e.target.files[0];

    if (imageFile) {
      const reader = new FileReader();
      reader.onload = () => {
        preview.innerHTML = `<img src="${reader.result}">`;
      };
      reader.readAsDataURL(imageFile);
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const shop = {
      name: document.getElementById("name").value,
      owner: document.getElementById("owner").value,
      description: document.getElementById("description").value,
      location: document.getElementById("location").value,
      horaires: document.getElementById("horaires").value,
      image: null
    };

    console.log("Boutique créée :", shop);

    alert("Boutique créée avec succès !");
    
    form.reset();
    preview.innerHTML = "";
  });
</script>

</body>
</html>
