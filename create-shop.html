<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer une boutique - Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="create-shop">
  <header class="topbar amazon-header">
    <a class="brand-logo" href="index.html"><img class="site-logo" src="images/logo.png" alt="Kome-Gab"></a>
    <div class="top-actions">
      <a class="profile-avatar-link" href="profile.html" id="profileAvatarLink" style="display:none;">
        <img id="headerProfileAvatar" class="header-profile-avatar" src="" alt="Profil">
      </a>
      <a class="link-btn" href="login.html" id="authLink">Connexion</a>
    </div>
  </header>

  <main class="page">
    <section class="panel" style="max-width: 600px; margin: 20px auto;">
      <h2>Créer votre boutique</h2>
      <p class="meta">Configurez votre espace de vente pour commencer à publier des produits.</p>

      <form id="createShopForm" class="form">
        <label for="shopName">Nom de la boutique</label>
        <input type="text" id="shopName" placeholder="Ex: Ma Super Boutique" required>

        <label for="shopDescription">Description</label>
        <textarea id="shopDescription" placeholder="Description de votre activité, vos produits..." rows="3"></textarea>

        <label for="shopLogo">Logo de la boutique</label>
        <input type="file" id="shopLogo" accept="image/*">
        <div id="shopLogoPreview" class="preview-grid"></div>

        <label for="shopAddress">Adresse / Localisation</label>
        <input type="text" id="shopAddress" placeholder="Ex: Libreville, Quartier Louis">

        <label for="shopHours">Jours d'ouverture</label>
        <textarea id="shopOpenDayInput" placeholder="Ex: Lundi - Samedi" rows="2"></textarea>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
            <div>
              <label for="shopOpenTimeInput" style="font-size: 0.85rem;">Heure d'ouverture (Auto)</label>
              <input type="time" id="shopOpenTimeInput">
            </div>
            <div>
              <label for="shopCloseTimeInput" style="font-size: 0.85rem;">Heure de fermeture (Auto)</label>
              <input type="time" id="shopCloseTimeInput">
            </div>
        </div>

        <button type="submit" id="createShopBtn">Créer la boutique</button>
      </form>
    </section>
  </main>
  <script type="module" src="js/script.js"></script>
</body>
</html>
