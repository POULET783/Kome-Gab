﻿﻿﻿<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon profil - Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="profile">
  
  <main class="page">

    <header class="profile-header">
      <button class="back-btn" onclick="history.back()">
        <i data-lucide="arrow-left"></i>
      </button>
      <h2>Mon Profil</h2>
    </header>
    
    <section class="panel profile-card">

      <div class="profile-avatar-wrap">
        <div class="profile-image-container">
          <img id="profileAvatar" class="profile-avatar" src="https://placehold.co/160x160?text=Profil" alt="Photo de profil">
          <label for="profilePhotoFile" class="profile-edit-overlay"><i class="fa-solid fa-camera"></i>&nbsp;Modifier</label>
        </div>
        <input id="profilePhotoFile" type="file" accept="image/*" style="display: none;">
      </div>

      <div class="form" id="profileForm">
        <!-- View State -->
        <div class="view-state">
          <div class="info-item"><span class="info-label">Nom</span><p id="profileNameDisplay"></p></div>
          <div class="info-item"><span class="info-label">WhatsApp</span><p id="profilePhoneDisplay"></p></div>
          <div class="info-item"><span class="info-label">Email</span><p id="profileEmail"></p></div>
          <div class="info-item"><span class="info-label">Type</span><p id="profileRole"></p></div>
          <button id="editProfileBtn" type="button">Modifier mon profil</button>
        </div>

        <!-- Edit State -->
        <div class="edit-state">
          <label for="profileNameInput">Nom d'utilisateur</label>
          <input id="profileNameInput" placeholder="Votre nom">
          <label for="profilePhoneInput">Téléphone (WhatsApp)</label>
          <input id="profilePhoneInput" placeholder="241XXXXXXXX">
          <button id="saveProfileBtn" type="button">Enregistrer</button>
          <button id="cancelProfileBtn" type="button" class="secondary">Annuler</button>
        </div>

        <button id="deleteAccountBtn" type="button" style="background: var(--danger); margin-top: 15px;">Supprimer mon compte</button>
        <button id="deconnexionBtn" type="button" style="background: var(--line); margin-top: 15px;">Se déconnecter</button>
        
      </div>
    </section>

    <div class="profile-dashboard panel" style="padding: 0; overflow: hidden; position: relative;">
      <div class="profile-tabs" style="padding-right: 44px;">
        <button class="profile-tab active" data-tab="products">Mes produits</button>
        <button class="profile-tab" data-tab="my-videos">Mes vidéos</button>
        <button class="profile-tab" data-tab="saved-videos">Vidéos enregistrées</button>
        <button class="profile-tab" data-tab="favorites">Favoris</button>
        <button class="profile-tab" data-tab="shops">Suivies</button>
      </div>
      <button id="profileSectionOptions" class="grid-options-btn" style="position: absolute; top: 8px; right: 8px; margin-top: 0; z-index: 10; background: none; box-shadow: none;"><i class="fa-solid fa-ellipsis-vertical"></i></button>

      <div id="profileGrid" class="profile-grid"></div>
      
      <p id="profileEmptyMsg" class="empty" style="text-align:center; padding:30px; display:none;">Rien à afficher ici.</p>
    </div>

    <!-- Global Options Menu (hidden by default, positioned dynamically by JS) -->
    <div id="globalOptionsMenu" class="grid-options-menu">
      <!-- Le contenu sera injecté ici par JavaScript -->
    </div>

    <!-- Barre d'actions groupées (Cachée par défaut) -->
    <div id="bulkActionsBar" class="bulk-actions-bar">
      <div style="display:flex; flex-direction:column; gap:4px;">
        <span id="selectedCount" style="font-weight:bold;">0 sélectionné(s)</span>
        <div style="display:flex; gap:8px;">
          <button id="selectAllBtn" class="select-mode-btn" style="width:auto; padding:2px 10px; font-size:0.75rem;">Tout sélectionner</button>
          <button id="cancelBulkBtn" class="select-mode-btn" style="width:auto; padding:2px 10px; font-size:0.75rem;">Annuler</button>
        </div>
      </div>
      <button id="bulkActionBtn" style="background: var(--danger); width: auto; padding: 10px 20px; border-radius: 8px;">Supprimer</button>
    </div>
    
  </main>

  <!-- Modal pour afficher les photos de profil en grand -->
  <div id="profileImageModal" class="profile-image-modal">
    <img id="modalProfileImage" src="" alt="Photo de profil en grand">
  </div>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function(){ emailjs.init("pIgaKR9S7aPVoaiEf"); })();
  </script>

  <script type="module" src="js/script.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
