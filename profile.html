﻿<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon profil - Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body data-page="profile">
  <header class="topbar amazon-header">
    <a class="brand-logo" href="index.html"><img class="site-logo" src="images/logo.png" alt="Kome-Gab"></a>
    <div class="top-actions">
      <a class="link-btn" href="login.html" id="authLink">Connexion</a>
    </div>
  </header>

  <nav id="mobileMenu" class="mobile-menu" aria-hidden="true">
    <a href="index.html">Accueil</a>
    <a href="videos.html">Vidéos</a>
    <a href="occasion.html">Occasion</a>
    <a href="boutique.html">Boutiques</a>
    <a href="publication.html">Publication</a>
    <a href="dashboard.html">Dashboard</a>
    <!-- <a href="register.html">Créer un compte</a> -->
  </nav>

  <main class="page">
    <section class="panel profile-card">
      <h2>Profil (style WhatsApp)</h2>

      <div class="profile-avatar-wrap">
        <div class="profile-image-container">
          <img id="profileAvatar" class="profile-avatar" src="https://placehold.co/160x160?text=Profil" alt="Photo de profil">
          <label for="profilePhotoFile" class="profile-edit-overlay"><i class="fa-solid fa-camera"></i>&nbsp;Modifier</label>
        </div>
        <input id="profilePhotoFile" type="file" accept="image/*" style="display: none;">
      </div>

      <div class="form" id="profileForm">
        <!-- View State -->
        <div class="view-state">
          <div class="info-item"><span class="info-label">Nom</span><p id="profileNameDisplay"></p></div>
          <div class="info-item"><span class="info-label">WhatsApp</span><p id="profilePhoneDisplay"></p></div>
          <div class="info-item"><span class="info-label">Email</span><p id="profileEmail"></p></div>
          <div class="info-item"><span class="info-label">Type</span><p id="profileRole"></p></div>
          <button id="editProfileBtn" type="button">Modifier</button>
        </div>

        <!-- Edit State -->
        <div class="edit-state">
          <label for="profileNameInput">Nom d'utilisateur</label>
          <input id="profileNameInput" placeholder="Votre nom">
          <label for="profilePhoneInput">Téléphone (WhatsApp)</label>
          <input id="profilePhoneInput" placeholder="241XXXXXXXX">
          <button id="saveProfileBtn" type="button">Enregistrer</button>
          <button id="cancelProfileBtn" type="button" class="secondary">Annuler</button>
        </div>

        <button id="deleteAccountBtn" type="button" style="background: var(--danger); margin-top: 15px;">Supprimer mon compte</button>
      </div>
    </section>

    <!-- Section Mes produits -->
    <!-- <section class="panel">
      <h2>Mes produits</h2>
      <div id="myProducts" class="cards"></div>
      <p id="emptyMyProducts" class="empty">Vous n'avez pas encore publié de produits.</p>
    </section> -->

    <section class="panel">
      <h2>Mes produits</h2>
      <div id="myProducts" class="cards"></div>
      <p id="emptyMyProducts" class="empty">Vous n'avez pas encore publié de produits.</p>
    </section>
    
  </main>

  <!-- Modal pour afficher les photos de profil en grand -->
  <div id="profileImageModal" class="profile-image-modal">
    <img id="modalProfileImage" src="" alt="Photo de profil en grand">
  </div>

  <script type="module" src="js/script.js"></script>
</body>
</html>
