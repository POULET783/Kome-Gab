<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutiques - Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="boutique">
  <header class="topbar amazon-header">
    <a class="brand-logo" href="index.html"><img class="site-logo" src="images/logo.png" alt="Kome-Gab"></a>
    <div class="top-actions">
      <a class="profile-avatar-link" href="profile.html" id="profileAvatarLink">
        <img id="headerProfileAvatar" class="header-profile-avatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff&size=32" alt="Profil">
      </a>
      <a class="link-btn" href="login.html" id="authLink">Déconnexion</a>
    </div>
  </header>

  <nav id="mobileMenu" class="mobile-menu" aria-hidden="true">
    <a href="index.html">Accueil</a>
    <a href="occasion.html">Occasion</a>
    <a href="boutique.html">Boutiques</a>
    <a href="publication.html">Publication</a>
    <a href="dashboard.html">Dashboard</a>
    <!-- <a href="register.html">Créer un compte</a> -->
  </nav>

  <main class="page">
    <section class="panel">
      <h2 id="shopName">Liste des boutiques</h2>
      <div class="filters boutique-filters">
        <div class="amazon-search-wrap">
          <select class="search-catalog" aria-label="Catalogues boutiques">
            <option value="">Catalogues</option>
            <option value="Téléphone">Téléphone</option>
            <option value="Ordinateur">Ordinateur</option>
            <option value="Voiture">Voiture</option>
            <option value="Vêtement">Vêtement</option>
            <option value="Chaussures">Chaussures</option>
            <option value="Accessoires">Accessoires</option>
            <option value="Montre">Montre</option>
            <option value="Bijoux">Bijoux</option>
            <option value="Nourriture">Nourriture</option>
            <option value="Autre">Autre</option>
            <option value="Occasion">Occasion</option>
          </select>
          <input id="boutiqueSearchInput" class="search-main-input" type="text" placeholder="Rechercher boutique ou produit boutique...">
          <button id="boutiqueSearchBtn" class="search-icon-btn" type="button" aria-label="Rechercher">&#128269;</button>
        </div>
      </div>
      <div id="shopProducts" class="cards"></div>
      <p id="emptyShopProducts" class="empty">Aucun résultat.</p>
    </section>
  </main>

  <!-- Include le panier latéral -->
  <div id="cartSidebarContainer"></div>

  <script type="module" src="js/script.js"></script>
</body>
</html>
