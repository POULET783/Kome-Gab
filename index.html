<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kome-Gab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">
  <!-- Inclure le panier latéral -->
  <div id="cartSidebarContainer"></div>

  <header class="topbar amazon-header">
    <a class="brand-logo" href="index.html"><img class="site-logo" src="images/logo.png" alt="Kome-Gab"></a>
    <div class="top-actions">
      <a class="profile-avatar-link" href="profile.html" id="profileAvatarLink">
        <img id="headerProfileAvatar" class="header-profile-avatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff&size=32" alt="Profil">
      </a>
      <a class="link-btn" href="login.html" id="authLink">Déconnexion</a>
    </div>
  </header>

  <nav id="mobileMenu" class="mobile-menu" aria-hidden="true">
    <a href="index.html">Accueil</a>
    <a href="videos.html">Vidéos</a>
    <a href="occasion.html">Occasion</a>
    <a href="boutique.html">Boutiques</a>
    <a href="publication.html">Publication</a>
    <a href="dashboard.html">Dashboard</a>
    <!-- <a href="register.html">Créer un compte</a> -->
  </nav>

  <main class="page">

    <section class="panel amazon-search-panel">
      <h2>Marketplace Kome-Gab</h2>
      <div class="filters">
        <div class="amazon-search-wrap">
          <select id="categoryFilter" aria-label="Catalogues">
            <option value="">Catalogues</option>
            <option value="Téléphone">Téléphone</option>
            <option value="Ordinateur">Ordinateur</option>
            <option value="Voiture">Voiture</option>
            <option value="Vêtement">Vêtement</option>
            <option value="Chaussures">Chaussures</option>
            <option value="Accessoires">Accessoires</option>
            <option value="Montre">Montre</option>
            <option value="Bijoux">Bijoux</option>
            <option value="Nourriture">Nourriture</option>
            <option value="Autre">Autre</option>
            <option value="Occasion">Occasion</option>
          </select>
          <input type="text" id="searchInput" placeholder="Rechercher un produit, une marque, une catégorie">
          <button id="searchBtn" class="search-icon-btn" type="button" aria-label="Rechercher">&#128269;</button>
        </div>
        <input type="number" id="maxPriceFilter" min="0" placeholder="Prix max (FCFA)">
      </div>
    </section>

    <!-- BARRE DE STORIES -->
    <section class="panel stories-panel">
      <div id="storiesContainer" class="stories-wrapper"></div>
    </section>

    <section class="panel">
      <h3>Produits disponibles</h3>
      <div id="products" class="cards"></div>
      <p id="emptyProducts" class="empty">Aucun produit pour le moment.</p>
    </section>
  </main>

  <!-- MODALE UPLOAD STORY -->
  <div id="storyUploadModal" class="modal">
    <div class="modal-content" style="max-width: 350px; text-align: center;">
      <span class="close-modal">&times;</span>
      <h3>Créer une story</h3>
      <input type="file" id="storyFileInput" accept="image/*,video/*" style="display:none;">
      
      <div id="storyPreviewArea" style="margin: 15px 0; min-height: 200px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; border-radius: 8px; overflow: hidden;">
        <p class="meta" id="storyPlaceholderText">Cliquez pour ajouter une photo ou vidéo</p>
      </div>

      <button id="triggerStoryFileBtn" class="secondary" style="margin-bottom: 10px;">Choisir un fichier</button>
      <button id="publishStoryBtn" disabled>Publier la story</button>
    </div>
  </div>

  <!-- MODALE VISIONNEUSE STORY (FULLSCREEN) -->
  <div id="storyViewerModal" class="story-viewer-modal">
    <button class="close-story-viewer">&times;</button>
    <div class="story-progress-bar"><div class="story-progress-fill" id="storyProgress"></div></div>
    <div id="storyContentContainer" class="story-content-container"></div>
    <div class="story-user-info" id="storyUserInfo"></div>
  </div>

  <script type="module" src="js/script.js"></script>
</body>
</html>
